name: Bootstrap source

on:
  push:
    branches: [main]
    paths:
      - '.bootstrap/archive.part04'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and publish source
        shell: bash
        env:
          EXPECTED_SHA256: 2023c4ff4e1fc364e29864a999227ce27e0dd90ba34c3c3c8328e42a4bbc5567
        run: |
          set -Eeuo pipefail
          cat .bootstrap/archive.part* > /tmp/backhaul-source.tar.gz.b64
          base64 --decode /tmp/backhaul-source.tar.gz.b64 > /tmp/backhaul-source.tar.gz
          echo "${EXPECTED_SHA256}  /tmp/backhaul-source.tar.gz" | sha256sum --check -
          rm -rf .bootstrap
          tar -xzf /tmp/backhaul-source.tar.gz -C .
          chmod 0755 install.sh installer/backhaul.sh scripts/build-release.sh scripts/publish-github.sh tests/quick_install_test.sh tools/interop_original_tcp.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "publish recovered Backhaul source"
          git push origin HEAD:main

      - name: Validate source
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Run tests
        shell: bash
        run: |
          set -Eeuo pipefail
          go test ./... -count=1
          go vet ./...
          bash -n install.sh installer/backhaul.sh scripts/build-release.sh scripts/publish-github.sh tests/quick_install_test.sh
          ./tests/quick_install_test.sh

      - name: Build and publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v2.0.0-hotfix8-recovered.3
        run: |
          set -Eeuo pipefail
          ./scripts/build-release.sh dist
          git tag -f "$RELEASE_TAG"
          git push --force origin "refs/tags/$RELEASE_TAG"
          assets=(
            dist/backhaul_linux_amd64
            dist/backhaul_linux_arm64
            dist/backhaul.sh
            dist/install.sh
            dist/SHA256SUMS
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --title "$RELEASE_TAG" --generate-notes
          fi
