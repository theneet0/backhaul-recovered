name: Bootstrap source

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: github.event.issue.pull_request == null && github.event.comment.body == 'PUBLISH'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct source archive
        env:
          EXPECTED_SHA256: 2023c4ff4e1fc364e29864a999227ce27e0dd90ba34c3c3c8328e42a4bbc5567
        shell: bash
        run: |
          set -Eeuo pipefail
          cat .bootstrap/part* > /tmp/project.b64
          base64 --decode /tmp/project.b64 > /tmp/project.tar.gz
          echo "${EXPECTED_SHA256}  /tmp/project.tar.gz" | sha256sum --check -
          mkdir -p /tmp/project
          tar -xzf /tmp/project.tar.gz -C /tmp/project
          cp -a /tmp/project/. ./
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap.yml
          chmod 0755 install.sh installer/backhaul.sh scripts/build-release.sh scripts/publish-github.sh tests/quick_install_test.sh tools/interop_original_tcp.py

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Validate source
        shell: bash
        run: |
          set -Eeuo pipefail
          go test ./... -count=1
          go vet ./...
          bash -n install.sh installer/backhaul.sh scripts/build-release.sh scripts/publish-github.sh tests/quick_install_test.sh
          ./tests/quick_install_test.sh

      - name: Publish source
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "publish recovered Backhaul source"
          git push origin HEAD:main

      - name: Build and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v2.0.0-hotfix8-recovered.3
        shell: bash
        run: |
          set -Eeuo pipefail
          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"
          ./scripts/build-release.sh dist
          gh release create "$RELEASE_TAG" \
            dist/backhaul_linux_amd64 \
            dist/backhaul_linux_arm64 \
            dist/backhaul.sh \
            dist/install.sh \
            dist/SHA256SUMS \
            --title "$RELEASE_TAG" \
            --generate-notes \
            --target "$(git rev-parse HEAD)"

      - name: Close trigger issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --repo "$GITHUB_REPOSITORY" --comment "Source, tag, and release published successfully."
