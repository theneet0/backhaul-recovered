name: Assemble staged source

on:
  push:
    branches: [main]
    paths:
      - '.staging/READY'

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble exact source files
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p installer internal/tunnel
          cat .staging/installer.part.* > installer/backhaul.sh
          cat .staging/runner.part.* > internal/tunnel/runner.go
          sed -i $'s/^n\t\t\t\t\tvar worker/\t\t\t\t\tvar worker/' internal/tunnel/runner.go
          chmod 0755 installer/backhaul.sh install.sh scripts/*.sh tests/*.sh

      - name: Validate assembled source
        shell: bash
        run: |
          set -Eeuo pipefail
          go test ./... -count=1
          go vet ./...
          bash -n install.sh installer/backhaul.sh scripts/build-release.sh scripts/publish-github.sh tests/quick_install_test.sh
          ./tests/quick_install_test.sh

      - name: Commit clean source tree
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf .staging .bootstrap
          rm -f PUBLISH_REQUEST.txt
          rm -f .github/workflows/bootstrap.yml .github/workflows/assemble-large.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "publish complete recovered Backhaul source"
          git push origin HEAD:main

      - name: Create release tag
        shell: bash
        run: |
          set -Eeuo pipefail
          git tag -f v2.0.0-hotfix8-recovered.3
          git push --force origin refs/tags/v2.0.0-hotfix8-recovered.3
