name: Diagnose release tests

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    if: github.event.issue.pull_request == null && github.event.comment.body == 'DIAGNOSE_RELEASE_TESTS'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false
      - name: Run tests and report exact failures
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          set +e
          mkdir -p internal/tunnel installer
          cat .staging/runner.part.* > internal/tunnel/runner.go
          cat .staging/installer.part.* > installer/backhaul.sh
          chmod 0755 install.sh installer/backhaul.sh scripts/*.sh tests/*.sh tools/interop_original_tcp.py
          rm -f go.sum
          go mod tidy > /tmp/tidy.log 2>&1
          tidy_rc=$?
          go test ./... -count=1 > /tmp/test.log 2>&1
          test_rc=$?
          go vet ./... > /tmp/vet.log 2>&1
          vet_rc=$?
          bash -n install.sh installer/backhaul.sh scripts/build-release.sh scripts/publish-github.sh tests/quick_install_test.sh > /tmp/bash.log 2>&1
          bash_rc=$?
          ./tests/quick_install_test.sh > /tmp/quick.log 2>&1
          quick_rc=$?
          {
            echo 'RELEASE_TEST_DIAGNOSTIC'
            echo
            echo "tidy_rc=$tidy_rc test_rc=$test_rc vet_rc=$vet_rc bash_rc=$bash_rc quick_rc=$quick_rc"
            for item in tidy test vet bash quick; do
              echo
              echo "## $item"
              echo '```text'
              tail -n 120 "/tmp/$item.log"
              echo '```'
            done
          } > /tmp/body.md
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/body.md
